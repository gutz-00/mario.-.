<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mario 1-3</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background: linear-gradient(180deg, #87ceeb 0%, #5c94fc 70%) !important; }
</style>
</head>
<body>
<div id="viewport"><div id="world"></div></div>
<div id="ui"></div>
<script>
/*
  FASE 1-3 — Plataformas nas árvores
  Chão CONTÍNUO no fundo — inimigos caminham embaixo.
  Plataformas elevadas para o Mario atravessar por cima.
  Sem inimigos flutuando.
*/
window.LEVEL_CONFIG = {
  id: "1-3",
  width: 4200,

  // Chão contínuo — sem buracos nesta fase (estilo árvores do SMB original)
  ground: [
    { x:0,    w:4200 }
  ],

  pipes: [
    { x:120,  h:60 },
    { x:600,  h:80 },
    { x:1400, h:70 },
    { x:2200, h:80 },
    { x:3200, h:70 },
    { x:3800, h:80 }
  ],

  // Plataformas elevadas — Mario sobe e atravessa por cima
  // y = altura do pé da plataforma acima do chão
  platforms: [
    // Bloco 1
    { x:300,  y:180, w:160, h:24, color:"#5a3a1a", border:"#2a1a0a" },
    { x:560,  y:240, w:140, h:24, color:"#5a3a1a", border:"#2a1a0a" },

    // Bloco 2 — escada
    { x:760,  y:160, w:120, h:24, color:"#5a3a1a", border:"#2a1a0a" },
    { x:940,  y:220, w:120, h:24, color:"#5a3a1a", border:"#2a1a0a" },
    { x:1120, y:160, w:120, h:24, color:"#5a3a1a", border:"#2a1a0a" },

    // Bloco 3 — plataformas altas
    { x:1480, y:200, w:140, h:24, color:"#5a3a1a", border:"#2a1a0a" },
    { x:1680, y:260, w:140, h:24, color:"#5a3a1a", border:"#2a1a0a" },
    { x:1880, y:200, w:140, h:24, color:"#5a3a1a", border:"#2a1a0a" },

    // Bloco 4
    { x:2300, y:180, w:140, h:24, color:"#5a3a1a", border:"#2a1a0a" },
    { x:2500, y:240, w:120, h:24, color:"#5a3a1a", border:"#2a1a0a" },
    { x:2700, y:180, w:120, h:24, color:"#5a3a1a", border:"#2a1a0a" },

    // Bloco 5 — degraus finais
    { x:3000, y:80,  w:120, h:24, color:"#5a3a1a", border:"#2a1a0a" },
    { x:3160, y:140, w:120, h:24, color:"#5a3a1a", border:"#2a1a0a" },
    { x:3340, y:200, w:120, h:24, color:"#5a3a1a", border:"#2a1a0a" },
    { x:3520, y:140, w:120, h:24, color:"#5a3a1a", border:"#2a1a0a" },
    { x:3700, y:80,  w:120, h:24, color:"#5a3a1a", border:"#2a1a0a" },

    // Final
    { x:3960, y:160, w:180, h:24, color:"#5a3a1a", border:"#2a1a0a" }
  ],

  blocks: [
    // Grupo 1: lucky em x:360 — blocos afastados
    { x:320,  y:260 }, { x:420, y:260 },
    // Grupo 2: lucky em x:820 — blocos afastados
    { x:780,  y:240 }, { x:880, y:240 },
    // Grupo 3: lucky em x:1540 — blocos afastados
    { x:1500, y:280 }, { x:1600, y:280 },
    // Grupo 4: lucky em x:2360 — blocos afastados
    { x:2320, y:260 }, { x:2420, y:260 },
    // Final: lucky em x:3900 — blocos afastados
    { x:3860, y:200 }, { x:3960, y:200 }
  ],

  lucky: [
    { x:360,  y:260 },
    { x:820,  y:240 },
    { x:1540, y:280 },
    { x:2360, y:260 },
    { x:3900, y:200 }
  ],

  coins: [
    { x:400,  y:120 }, { x:440,  y:120 }, { x:480,  y:120 },
    { x:820,  y:300 }, { x:860,  y:300 },
    { x:1490, y:280 }, { x:1530, y:280 }, { x:1570, y:280 },
    { x:1700, y:340 }, { x:1740, y:340 },
    { x:2320, y:260 }, { x:2360, y:260 },
    { x:3040, y:160 }, { x:3080, y:160 }, { x:3120, y:160 },
    { x:3900, y:140 }, { x:3940, y:140 }
  ],

  // Goombas — todos no chão (y=0), espalhados para não colidir com pipes
  enemies: [
    { x:280,  vx:-1.5 },
    { x:700,  vx:-1.5 },
    { x:1000, vx:-1.5 },
    { x:1650, vx:-1.8 },
    { x:2050, vx:-1.5 },
    { x:2800, vx:-1.8 },
    { x:3500, vx:-1.5 }
  ],

  // Koopas — no chão
  koopas: [
    { x:880,  vx:-1.5 },
    { x:1780, vx:-2.0 },
    { x:2600, vx:-1.8 },
    { x:3900, vx:-1.5 }
  ],

  // Beetles
  beetles: [
    { x:1260, vx:-1.2 },
    { x:3060, vx:-1.2 }
  ],

  // Piranhas — apenas nos pipes que têm chão embaixo
  piranhas: [
    { pipeX:120,  delay:40  },
    { pipeX:600,  delay:100 },
    { pipeX:1400, delay:60  },
    { pipeX:2200, delay:30  },
    { pipeX:3800, delay:80  }
  ],

  boss: false,
  nextLevel: "fase1-4.html"
};
</script>
<script src="game.js"></script>
</body>
</html>
