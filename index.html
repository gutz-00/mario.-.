<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mario Divs</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:#5c94fc;
    font-family:'Press Start 2P', monospace, sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100vh;
    overflow:hidden;
  }
  /* Pixel cloud decorations */
  body::before{
    content:"☁ ☁  ☁   ☁ ☁";
    position:absolute;top:40px;left:0;right:0;
    text-align:center;font-size:32px;color:white;letter-spacing:20px;
    opacity:0.7;
  }
  h1{
    color:#fff;
    font-size:clamp(18px,3vw,32px);
    text-shadow:4px 4px 0 #000, -2px -2px 0 #000;
    margin-bottom:12px;
    letter-spacing:2px;
  }
  .subtitle{color:#ffd700;font-size:10px;margin-bottom:48px;text-shadow:2px 2px 0 #000;}
  .btn{
    display:block;width:260px;padding:16px;margin:12px 0;
    background:#e52222;color:#fff;
    border:4px solid #000;
    font-family:inherit;font-size:14px;
    cursor:pointer;
    text-align:center;
    text-decoration:none;
    box-shadow:4px 4px 0 #000;
    transition:transform 0.1s, box-shadow 0.1s;
  }
  .btn:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 #000;}
  .btn:active{transform:translate(4px,4px);box-shadow:none;}
  .btn.secondary{background:#228b22;}
  .btn.danger{background:#555;}
  .ground{
    position:fixed;bottom:0;left:0;right:0;height:50px;
    background:#228b22;border-top:4px solid #000;
  }
  .save-info{color:#ffd700;font-size:8px;margin-top:20px;text-shadow:1px 1px 0 #000;}
</style>
</head>
<body>
<h1>🍄 MARIO</h1>
<p class="subtitle">USE SETAS + ESPAÇO + F</p>
<a class="btn" href="fase1-1.html">▶ JOGAR FASE 1-1</a>
<a class="btn secondary" href="fase1-2.html">▶ FASE 1-2</a>
<a class="btn secondary" href="fase1-3.html">▶ FASE 1-3</a>
<a class="btn secondary" href="fase1-4.html">▶ FASE 1-4 (BOSS)</a>
<button class="btn danger" onclick="resetSave()">✕ RESETAR SAVE</button>
<p class="save-info" id="saveInfo"></p>
<div class="ground"></div>
<script>
function resetSave(){
  localStorage.clear();
  alert("Save apagado!");
  updateSaveInfo();
}
function updateSaveInfo(){
  const coins = localStorage.getItem('totalCoins') || 0;
  document.getElementById('saveInfo').textContent = 'MOEDAS SALVAS: ' + coins;
}
updateSaveInfo();
</script>
</body>
</html>
