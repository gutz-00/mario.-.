<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mario 1-1</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="viewport"><div id="world"></div></div>
<div id="ui"></div>
<script>
/*
  FASE 1-1 — Mundo clássico
  Novos inimigos: Koopa Troopa, Buzzy Beetle
  Piranhas nos pipes
  Blocos marrons indestrutíveis, Lucky só 1 vez
*/
window.LEVEL_CONFIG = {
  id: "1-1",
  width: 3500,

  ground: [
    { x:0,    w:1380 },
    { x:1540, w:920  },
    { x:2620, w:880  }
  ],

  pipes: [
    { x:420,  h:60  },
    { x:700,  h:80  },
    { x:1000, h:100 },
    { x:2700, h:80  },
    { x:3060, h:60  }
  ],

  platforms: [
    { x:1160, y:80,  w:40,  h:20, color:"#8B5E3C", border:"#3d2b1f" },
    { x:1200, y:120, w:40,  h:20, color:"#8B5E3C", border:"#3d2b1f" },
    { x:1240, y:160, w:40,  h:20, color:"#8B5E3C", border:"#3d2b1f" },
    { x:1280, y:200, w:40,  h:20, color:"#8B5E3C", border:"#3d2b1f" },
    { x:1400, y:180, w:120, h:20, color:"#8B5E3C", border:"#3d2b1f" },
    { x:2480, y:140, w:100, h:20, color:"#8B5E3C", border:"#3d2b1f" },
    { x:2540, y:180, w:60,  h:20, color:"#8B5E3C", border:"#3d2b1f" }
  ],

  blocks: [
    // Grupo 1: lucky em x:340 — blocos afastados (gap de 20px)
    { x:300,  y:160 }, { x:400,  y:160 },
    { x:600,  y:160 },
    // Grupo 2: lucky em x:1660 — blocos afastados
    { x:1620, y:160 }, { x:1720, y:160 },
    // Grupo 3: lucky em x:2020 — blocos afastados
    { x:1960, y:200 }, { x:2080, y:200 }
  ],

  lucky: [
    { x:340,  y:160 },
    { x:860,  y:160 },
    { x:1660, y:160 },
    { x:2020, y:200 }
  ],

  coins: [
    { x:200, y:120 }, { x:240, y:120 }, { x:280, y:120 },
    { x:550, y:200 }, { x:590, y:200 }, { x:630, y:200 },
    { x:1640,y:240 }, { x:1680,y:240 },
    { x:1800,y:120 }, { x:1840,y:120 },
    { x:2800,y:120 }, { x:2840,y:120 }, { x:2880,y:120 }
  ],

  // Goombas clássicos
  enemies: [
    { x:500,  vx:-1.5 },
    { x:900,  vx:-1.5 },
    { x:2150, vx:-1.5 }
  ],

  // Koopa Troopas (verdes — andam e viram carapaça ao ser pisados)
  koopas: [
    { x:1700, vx:-1.5 },
    { x:2900, vx:-1.5 }
  ],

  // Buzzy Beetles (azul-escuro — resiste a 2 pisões)
  beetles: [
    { x:1200, vx:-1.2 }
  ],

  // Piranha Plants — pipeX deve corresponder ao x de um pipe existente
  piranhas: [
    { pipeX:700,  delay:40  },
    { pipeX:1000, delay:100 }
  ],

  boss: false,
  nextLevel: "fase1-2.html"
};
</script>
<script src="game.js"></script>
</body>
</html>
